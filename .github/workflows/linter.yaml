name: 🧪Linter CI
on: 
  push:
    branches:
      - feature_slack_lk
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:  
    - name: 🔨 Check out repository
      uses: actions/checkout@v4
    - name: ➕ Install flake8
      run: pip install flake8
    - name: ✅ Run flake8
      run: flake8 ./*.py
    